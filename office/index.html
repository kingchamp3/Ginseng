<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>강화인삼농협 업무페이지</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section id="loginScreen" class="login-screen" aria-labelledby="loginTitle">
      <div class="login-panel">
        <div class="brand-mark" aria-hidden="true">江</div>
        <p class="eyebrow">Ganghwa Ginseng Cooperative</p>
        <h1 id="loginTitle">강화인삼농협 업무페이지</h1>
        <form id="loginForm" class="login-form">
          <label for="passwordInput">비밀번호</label>
          <div class="password-row">
            <input id="passwordInput" type="password" autocomplete="current-password" placeholder="비밀번호 입력">
            <button type="submit">접속</button>
          </div>
          <p id="loginMessage" class="form-message" role="status"></p>
        </form>
      </div>
    </section>

    <section id="workspace" class="workspace" hidden>
      <aside class="sidebar">
        <div>
          <p class="eyebrow">업무 대시보드</p>
          <h2>강화인삼농협</h2>
        </div>
        <nav class="menu" aria-label="업무 메뉴">
          <button class="menu-button active" data-view="inventoryView" type="button">재고관리</button>
          <button class="menu-button" data-view="scheduleView" type="button">일정관리</button>
          <button class="menu-button" data-view="priceView" type="button">가격표</button>
          <button class="menu-button" data-view="marketView" type="button">인삼시세표</button>
        </nav>
        <button id="logoutButton" class="ghost-button" type="button">로그아웃</button>
      </aside>

      <section class="content">
        <header class="topbar">
          <div>
            <p class="eyebrow">오늘 업무</p>
            <h1 id="viewTitle">재고관리</h1>
          </div>
          <div class="status-chip" id="todayStamp"></div>
        </header>

        <section id="inventoryView" class="view active-view">
          <div class="section-head">
            <div>
              <h2>재고 현황</h2>
              <p>품목, 규격, 수량, 보관 위치를 빠르게 기록합니다.</p>
            </div>
            <button id="addInventoryButton" class="primary-button" type="button">추가</button>
          </div>
          <form id="inventoryForm" class="entry-grid">
            <input name="item" placeholder="품목명" required>
            <input name="grade" placeholder="규격/등급" required>
            <input name="quantity" type="number" min="0" step="1" placeholder="수량" required>
            <input name="location" placeholder="보관 위치">
          </form>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>품목</th><th>규격</th><th>수량</th><th>위치</th><th></th></tr>
              </thead>
              <tbody id="inventoryRows"></tbody>
            </table>
          </div>
        </section>

        <section id="scheduleView" class="view">
          <div class="section-head">
            <div>
              <h2>일정관리</h2>
              <p>수매, 회의, 출고, 점검 일정을 한곳에 정리합니다.</p>
            </div>
            <button id="addScheduleButton" class="primary-button" type="button">추가</button>
          </div>
          <form id="scheduleForm" class="entry-grid schedule-grid">
            <input name="date" type="date" required>
            <input name="time" type="time">
            <input name="title" placeholder="일정명" required>
            <input name="owner" placeholder="담당자">
          </form>
          <div id="scheduleList" class="schedule-list"></div>
        </section>

        <section id="priceView" class="view">
          <div class="section-head">
            <div>
              <h2>가격표</h2>
              <p>매장 안내용 판매 가격을 관리합니다.</p>
            </div>
            <button id="addPriceButton" class="primary-button" type="button">추가</button>
          </div>
          <form id="priceForm" class="entry-grid">
            <input name="name" placeholder="상품명" required>
            <input name="unit" placeholder="단위" required>
            <input name="price" type="number" min="0" step="100" placeholder="가격" required>
            <input name="memo" placeholder="비고">
          </form>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>상품</th><th>단위</th><th>가격</th><th>비고</th><th></th></tr>
              </thead>
              <tbody id="priceRows"></tbody>
            </table>
          </div>
        </section>

        <section id="marketView" class="view">
          <div class="section-head">
            <div>
              <h2>인삼시세표</h2>
              <p>인삼통 사이트 기준으로 매일 오전 8시 이후 갱신을 시도합니다.</p>
            </div>
            <button id="refreshMarketButton" class="primary-button" type="button">새로고침</button>
          </div>
          <div class="market-summary">
            <div>
              <span>최근 갱신</span>
              <strong id="marketUpdatedAt">-</strong>
            </div>
            <div>
              <span>다음 자동 갱신</span>
              <strong id="nextRefreshAt">-</strong>
            </div>
            <a class="external-link" href="https://insamtong.kr/" target="_blank" rel="noreferrer">인삼통 열기</a>
          </div>
          <div id="marketMessage" class="notice"></div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>구분</th><th>시세</th><th>출처</th></tr>
              </thead>
              <tbody id="marketRows"></tbody>
            </table>
          </div>
        </section>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
