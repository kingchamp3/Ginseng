<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>인삼 시세 예측</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Ginseng Market Forecast</p>
            <h1>인삼 시세 예측</h1>
          </div>
          <div class="status">
            <span id="modelStatus">샘플 데이터</span>
          </div>
        </header>

        <section class="metrics" aria-label="예측 요약">
          <article>
            <span>현재 추정가</span>
            <strong id="currentPrice">-</strong>
          </article>
          <article>
            <span>30일 예측</span>
            <strong id="forecast30">-</strong>
          </article>
          <article>
            <span>90일 예측</span>
            <strong id="forecast90">-</strong>
          </article>
          <article>
            <span>변동성</span>
            <strong id="volatility">-</strong>
          </article>
        </section>

        <section class="chart-panel">
          <div class="chart-head">
            <div>
              <h2>가격 흐름</h2>
              <p id="chartCaption">최근 데이터와 예측선을 함께 표시합니다.</p>
            </div>
            <div class="legend">
              <span><i class="actual"></i>실제</span>
              <span><i class="forecast"></i>예측</span>
            </div>
          </div>
          <canvas id="priceChart" width="1200" height="540" aria-label="인삼 시세 차트"></canvas>
        </section>

        <section class="table-panel">
          <div class="section-title">
            <h2>예측 결과</h2>
            <button id="downloadCsv" type="button">CSV 저장</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>날짜</th>
                  <th>예측가</th>
                  <th>하한</th>
                  <th>상한</th>
                </tr>
              </thead>
              <tbody id="forecastRows"></tbody>
            </table>
          </div>
        </section>
      </section>

      <aside class="controls">
        <section class="control-group">
          <h2>예측 설정</h2>
          <label>
            품목
            <select id="productType">
              <option value="fresh">수삼</option>
              <option value="red">홍삼 원료삼</option>
              <option value="white">백삼</option>
            </select>
          </label>
          <label>
            예측 기간
            <select id="horizon">
              <option value="30">30일</option>
              <option value="90" selected>90일</option>
              <option value="180">180일</option>
            </select>
          </label>
          <label>
            최근 데이터 가중치
            <input id="sensitivity" type="range" min="0" max="100" value="62" />
          </label>
        </section>

        <section class="control-group">
          <h2>데이터 입력</h2>
          <p class="hint">CSV 형식: 날짜, 가격. 예: 2026-06-01,42000</p>
          <textarea id="csvInput" spellcheck="false"></textarea>
          <div class="actions">
            <button id="loadSample" type="button">샘플</button>
            <button id="applyData" type="button">반영</button>
          </div>
          <p id="dataMessage" class="message"></p>
        </section>

        <section class="control-group">
          <h2>인삼통 시세 연동</h2>
          <p class="hint">인삼통 시세 페이지 주소를 넣거나, 페이지의 시세 표 내용을 그대로 붙여넣으면 현재 시세를 반영합니다.</p>
          <label>
            시세 페이지 URL
            <input id="marketUrl" type="url" placeholder="https://..." />
          </label>
          <textarea id="marketPaste" spellcheck="false" placeholder="인삼통 시세 표 또는 페이지 내용을 붙여넣기"></textarea>
          <div class="actions">
            <button id="fetchMarket" type="button">가져오기</button>
            <button id="applyMarket" type="button">추출 반영</button>
          </div>
          <p id="marketMessage" class="message"></p>
        </section>

        <section class="control-group insights">
          <h2>판단 신호</h2>
          <ul id="insights"></ul>
        </section>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
