<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>인삼통 시세 예측</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Insamtong Price Forecast</p>
            <h1>인삼통 시세 예측</h1>
          </div>
          <div class="status">
            <span id="modelStatus">인삼통 기준</span>
          </div>
        </header>

        <section class="metrics" aria-label="예측 요약">
          <article>
            <span>현재 시세</span>
            <strong id="currentPrice">-</strong>
          </article>
          <article>
            <span>30일 예측</span>
            <strong id="forecast30">-</strong>
          </article>
          <article>
            <span>90일 예측</span>
            <strong id="forecast90">-</strong>
          </article>
          <article>
            <span>전장 대비</span>
            <strong id="volatility">-</strong>
          </article>
        </section>

        <section class="chart-panel">
          <div class="chart-head">
            <div>
              <h2>예측 흐름</h2>
              <p id="chartCaption">인삼통 현재 시세와 전장 대비 변동률만 사용합니다.</p>
            </div>
            <div class="legend">
              <span><i class="actual"></i>현재</span>
              <span><i class="forecast"></i>예측</span>
            </div>
          </div>
          <canvas id="priceChart" width="1200" height="540" aria-label="인삼통 시세 예측 차트"></canvas>
        </section>

        <section class="table-panel">
          <div class="section-title">
            <h2>예측 결과</h2>
            <button id="downloadCsv" type="button">CSV 저장</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>날짜</th>
                  <th>예측가</th>
                  <th>하한</th>
                  <th>상한</th>
                </tr>
              </thead>
              <tbody id="forecastRows"></tbody>
            </table>
          </div>
        </section>
      </section>

      <aside class="controls">
        <section class="control-group">
          <h2>인삼통 기준값</h2>
          <p class="hint" id="sourceText">-</p>
          <label>
            등급
            <select id="gradeSelect"></select>
          </label>
          <label>
            예측 기간
            <select id="horizon">
              <option value="30">30일</option>
              <option value="90" selected>90일</option>
              <option value="180">180일</option>
            </select>
          </label>
          <label>
            추세 반영 강도
            <input id="sensitivity" type="range" min="0" max="100" value="58" />
          </label>
          <button id="refreshMarket" type="button">인삼통 수치 새로고침</button>
          <p id="refreshMessage" class="message"></p>
        </section>

        <section class="control-group">
          <h2>현재 인삼통 수치</h2>
          <div class="grade-list" id="gradeList"></div>
        </section>

        <section class="control-group insights">
          <h2>판단 신호</h2>
          <ul id="insights"></ul>
        </section>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
